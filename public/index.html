<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickTok Grab</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="icon/UlHGe.jpg" type="image/x-icon">
</head>
<body>

<div class="wrap">

  <div class="logo">
      <div class="logo-icon">
        <img src="icon/UlHGe.jpg" alt="icon">
      </div>
    <div>
      <div class="logo-title">QuickTok Grab</div>
      <div class="logo-sub">Paste a TikTok link to download</div>
    </div>
  </div>

  <div class="input-row">
    <input class="url-input" id="urlInput" type="text" placeholder="https://www.tiktok.com/@user/video/..." />
    <button class="btn-dl" onclick="download()">Download</button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="video-card" id="videoCard">
    <video id="videoPlayer" controls></video>
    <div class="video-footer">
      <span class="video-label">Ready to save</span>
      <button class="btn-save" id="saveBtn" onclick="saveVideo()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v9m0 0L5 7m3 3 3-3M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Save video
      </button>
    </div>
  </div>

  <p class="hint">Supports standard TikTok video URLs.</p>

</div>

<script src="js/index.js"></script>

</body>
</html>
